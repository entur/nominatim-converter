name: Build

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nominatim-convert-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nominatim-convert-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install PROJ (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libproj-dev

      - name: Install PROJ (macOS)
        if: runner.os == 'macOS'
        run: brew install proj

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Run clippy
        run: cargo clippy --release -- -D warnings

      - name: Prepare artifact
        run: |
          cp target/release/nominatim-convert ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Rename artifacts
        run: |
          mv nominatim-convert-linux-x86_64/nominatim-convert-linux-x86_64 nominatim-convert-linux-x86_64
          mv nominatim-convert-macos-aarch64/nominatim-convert-macos-aarch64 nominatim-convert-macos-aarch64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} nominatim-convert-* \
            --repo ${{ github.repository }} \
            --title "nominatim-convert ${{ github.ref_name }}" \
            --generate-notes
