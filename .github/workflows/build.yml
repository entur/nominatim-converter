name: Build

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nominatim-converter-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nominatim-converter-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Run clippy
        run: cargo clippy --release -- -D warnings

      - name: Prepare artifact
        run: |
          cp target/release/nominatim-converter ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            nominatim-converter-linux-x86_64/nominatim-converter-linux-x86_64 \
            nominatim-converter-macos-aarch64/nominatim-converter-macos-aarch64 \
            --repo ${{ github.repository }} \
            --title "nominatim-converter ${{ github.ref_name }}" \
            --generate-notes
